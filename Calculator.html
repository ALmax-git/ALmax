
<!DOCTYPE html>
<html>
    <head> 
        <title> calculator</title>  
    </head>
    <body> 
  
        <div id="calculator">
            <form id="calc" method="get" accept-charset="utf-8">
              
                <input type="text" name="screen" id="screen" value="" placeholder="0" disabled/>
                <div id="btn-a">
                
        <div id="smath">
          <table>
            <tr>
              <td><input type="button" value="sin(" class="bmc-btn"></td>
              <td><input type="button" value="cos(" class="bmc-btn"></td>
              <td><input type="button" value="tan(" class="bmc-btn"></td>
              <td><input type="button" value="(" class="bmc-btn"></td>
              <td><input type="button" value=")" class="bmc-btn"></td>
            </tr>
            <tr>
              <td><input type="button" value="square(" class="bmc-btn"></td>
              <td><input type="button" value="sqrt(" class="bmc-btn"></td>
              <td><input type="button" value="arcsin(" class="bmc-btn"></td>
              <td><input type="button" value="arccos(" class="bmc-btn"></td>
              <td><input type="button" value="arctan(" class="bmc-btn"></td>
            </tr>
            <tr>
              <td>
                <input type="button" value="log2(" class="bmc-btn">
              </td>
              <td><input type="button" value="cbrt(" class="bmc-btn"></td>
              <td><input type="button" value="cosh(" class="bmc-btn"></td>
              <td><input type="button" value="tanh(" class="bmc-btn"></td>
              <td><input type="button" value="sinh(" class="bmc-btn"></td>
            </tr>
            <tr>
              <td><input type="button" value="π" class="bmc-btn"></td>
              <td><input type="button" value="exp(" class="bmc-btn"></td>
              <td><input type="button" value="sinh(" class="bmc-btn"></td>
              <td><input type="button" value="asinh(" class="bmc-btn"></td>
              <td><input type="button" value="ln(" class="bmc-btn"></td>
            
            </tr>
          </table>
        </div> 
                <div id="bmath">
                    <table id="bmc" border="0">
                        <tr>
                            <td><input type="button" name="one" class="bmc-btn" value="1" class=""/></td>
                            <td><input type="button" name="two" class="bmc-btn" value="2" class=""/></td>
                            <td><input type="button" name="three" class="bmc-btn" value="3" class=""/></td>
                            <td><input type="button" name="plus" class="bmc-btn" value="+" class="o"/></td> 
                         </tr>
                        <tr>
                            <td><input type="button" name="four" class="bmc-btn" value="4" class=""/></td>
                            <td><input type="button" name="five" class="bmc-btn" value="5" class=""/></td>
                            <td><input type="button" name="six" class="bmc-btn" value="6" class=""/></td>
                            <td><input type="button" name="minus" class="bmc-btn" value="-" class="o"/></td>
                        </tr>
                        <tr>
                            <td><input type="button" name="seven" class="bmc-btn" value="7" class=""/></td>
                            <td><input type="button" name="eight" class="bmc-btn" value="8" class=""/></td>
                            <td><input type="button" name="ninr" class="bmc-btn" value="9" class=""/></td>
                            <td><input type="button" name="divide" class="bmc-btn" value="/" class="o"/></td>
                        </tr>
                        <tr>
                            <td><input type="button" name="clear" class="bmc-btn" value="AC" class="c"/></td>
                            <td><input type="button" name="zero" class="bmc-btn" value="0" class=""/></td>
                            <td><input type="button" name="equals" class="bmc-btn" value="=" class=""/></td>
                            <td><input type="button" name="multiply" class="bmc-btn" value="*" class="o"/></td>
                        </tr>
                        <tr>
                            <td><input type="button" name="dp" class="bmc-btn" value="." class=""/></td>
                            <td><input type="button" name="del" class="bmc-btn" value="del" class=""/></td>
                            <td><input type="button" name="dz" class="bmc-btn" value="00" class=""/></td>
                            <td><input type="button" name="square" class="bmc-btn" value="^" class=""/></td>
                        </tr>
                    </table>
        </div>
            </form>
        </div> 
    </body>
</html>
